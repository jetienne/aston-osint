server {
  listen 80;
  server_name SF_DOMAIN;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name SF_DOMAIN;

  # TLS certificates managed by certbot
  ssl_certificate /etc/letsencrypt/live/SF_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/SF_DOMAIN/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # Basic auth
  auth_basic "Aston OSINT";
  auth_basic_user_file /etc/nginx/.htpasswd;

  location / {
    proxy_pass http://127.0.0.1:5001;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support for SpiderFoot UI
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts for long-running scans
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
