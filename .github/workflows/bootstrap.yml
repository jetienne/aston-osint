name: Setup VPS

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup server via SSH as root
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_ROOT_KEY }}
          envs: SF_DOMAIN,CERT_EMAIL
          script: |
            export SF_DOMAIN="${SF_DOMAIN}"
            export CERT_EMAIL="${CERT_EMAIL}"
            rm -rf /opt/aston-osint
            git clone https://github.com/jetienne/aston-osint.git /opt/aston-osint
            bash /opt/aston-osint/scripts/bootstrap.sh
        env:
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
          CERT_EMAIL: ${{ secrets.CERT_EMAIL }}
