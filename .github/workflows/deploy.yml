name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SF_DOMAIN
          script: bash /opt/aston-osint/scripts/deploy.sh
        env:
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
