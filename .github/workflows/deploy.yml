name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_ROOT_KEY }}
          envs: SF_DOMAIN,OPENSANCTIONS_API_KEY,PAPPERS_API_KEY
          script: |
            git config --global --add safe.directory /opt/aston-osint
            printf 'OPENSANCTIONS_API_KEY=%s\nPAPPERS_API_KEY=%s\n' "${OPENSANCTIONS_API_KEY}" "${PAPPERS_API_KEY}" > /opt/aston-osint/.env
            bash /opt/aston-osint/scripts/deploy.sh
        env:
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
          OPENSANCTIONS_API_KEY: ${{ secrets.OPENSANCTIONS_API_KEY }}
          PAPPERS_API_KEY: ${{ secrets.PAPPERS_API_KEY }}
