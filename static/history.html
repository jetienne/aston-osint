<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Aston OSINT</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .scan-card { background: #fff; border: 1px solid #e5e1dd; border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; cursor: pointer; transition: box-shadow 0.15s; display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit; }
    .scan-card:hover { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
    .scan-info { flex: 1; }
    .scan-query { font-family: 'Source Serif 4', Georgia, serif; font-weight: 600; font-size: 0.95rem; }
    .scan-meta { font-size: 0.75rem; color: #8b8680; margin-top: 3px; }
    .scan-badge { font-size: 0.65rem; padding: 3px 10px; border-radius: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-complete { background: #e8f5e9; color: #2e7d32; }
    .badge-running { background: #fff3e0; color: #e65100; }
    .badge-pending { background: #f5f5f5; color: #999; }
    .badge-failed { background: #ffebee; color: #c62828; }
    .badge-generating { background: #e3f2fd; color: #1565c0; }
    .badge-report_ready { background: #e8f5e9; color: #1b5e20; }
    .badge-report_failed { background: #ffebee; color: #c62828; }
    .report-actions { margin: 16px 0; display: flex; gap: 8px; }
    .report-actions a { display: inline-block; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; text-decoration: none; font-family: 'Inter', sans-serif; }
    .report-actions .btn-download { background: #b3714f; color: #fff; }
    .report-actions .btn-download:hover { background: #9a5f3f; }
    .report-actions .btn-json { background: #fff; color: #5a554f; border: 1px solid #d4d0cc; }
    .report-actions .btn-json:hover { background: #f5f5f5; }
    .scan-matches { font-size: 0.8rem; color: #5a554f; font-weight: 500; }
    .empty { color: #8b8680; padding: 40px 0; text-align: center; }

    .detail-back { font-size: 0.8rem; color: #b3714f; text-decoration: none; margin-bottom: 16px; display: inline-block; }
    .detail-back:hover { text-decoration: underline; }
    .detail-header { margin-bottom: 20px; }
    .detail-query { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.2rem; font-weight: 600; }
    .detail-meta { font-size: 0.8rem; color: #8b8680; margin-top: 4px; }
    .detail-kwargs { font-size: 0.8rem; color: #5a554f; margin-top: 4px; }
    .detail-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .detail-toggle button { padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; font-family: 'Inter', sans-serif; cursor: pointer; border: 1px solid #d4d0cc; background: #fff; color: #5a554f; }
    .detail-toggle button.active { background: #b3714f; color: #fff; border-color: #b3714f; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">Aston OSINT</div>
    <div class="sidebar-section">
      <div class="sidebar-label">Intelligence</div>
      <a href="/" class="sidebar-link">Scan</a>
      <a href="/history.html" class="sidebar-link active">History</a>
      <a href="/sources.html" class="sidebar-link">Sources</a>
    </div>
  </aside>

  <main class="content" id="app"></main>

  <script>
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const scanId = params.get('id');

    if (scanId) {
      loadDetail(scanId);
    } else {
      loadList();
    }

    async function loadList() {
      app.textContent = '';

      const header = document.createElement('div');
      header.className = 'page-header';
      const h1 = document.createElement('h1');
      h1.textContent = 'Scan History';
      header.appendChild(h1);
      app.appendChild(header);

      const resp = await fetch('/api/v1/scans');
      const data = await resp.json();

      if (data.scans.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No scans yet. Run your first scan from the Scan page.';
        app.appendChild(empty);
        return;
      }

      for (const scan of data.scans) {
        const card = document.createElement('a');
        card.className = 'scan-card';
        card.href = '/history.html?id=' + scan.id;

        const info = document.createElement('div');
        info.className = 'scan-info';

        const query = document.createElement('div');
        query.className = 'scan-query';
        query.textContent = scan.query;
        info.appendChild(query);

        const meta = document.createElement('div');
        meta.className = 'scan-meta';
        const date = new Date(scan.created_at);
        meta.textContent = date.toLocaleString() + ' | ' + (scan.duration_ms || 0) + 'ms';
        if (scan.sources_hit && scan.sources_hit.length) {
          meta.textContent += ' | ' + scan.sources_hit.join(', ');
        }
        info.appendChild(meta);

        card.appendChild(info);

        if (scan.status === 'complete' && scan.match_count > 0) {
          const matches = document.createElement('div');
          matches.className = 'scan-matches';
          matches.textContent = scan.match_count + ' match' + (scan.match_count !== 1 ? 'es' : '');
          card.appendChild(matches);
        }

        const badge = document.createElement('span');
        badge.className = 'scan-badge badge-' + scan.status;
        badge.textContent = scan.status;
        card.appendChild(badge);

        app.appendChild(card);
      }
    }

    async function loadDetail(id) {
      app.textContent = '';

      const back = document.createElement('a');
      back.className = 'detail-back';
      back.href = '/history.html';
      back.textContent = 'Back to history';
      app.appendChild(back);

      const resp = await fetch('/api/v1/scans/' + id);
      if (!resp.ok) {
        app.textContent = 'Scan not found.';
        return;
      }
      const scan = await resp.json();

      const header = document.createElement('div');
      header.className = 'detail-header';

      const query = document.createElement('div');
      query.className = 'detail-query';
      query.textContent = scan.query;
      header.appendChild(query);

      const meta = document.createElement('div');
      meta.className = 'detail-meta';
      const date = new Date(scan.created_at);
      meta.textContent = scan.status.toUpperCase() + ' | ' + date.toLocaleString() + ' | ' + (scan.duration_ms || 0) + 'ms';
      header.appendChild(meta);

      if (scan.kwargs && Object.keys(scan.kwargs).length > 0) {
        const kwargs = document.createElement('div');
        kwargs.className = 'detail-kwargs';
        kwargs.textContent = Object.entries(scan.kwargs).map(function(e) { return e[0] + ': ' + e[1]; }).join(' | ');
        header.appendChild(kwargs);
      }

      app.appendChild(header);

      let showRaw = false;
      const toggle = document.createElement('div');
      toggle.className = 'detail-toggle';

      const filteredBtn = document.createElement('button');
      filteredBtn.className = 'active';
      filteredBtn.textContent = 'Filtered results';

      const rawBtn = document.createElement('button');
      rawBtn.textContent = 'Raw results';

      const resultsContainer = document.createElement('div');

      filteredBtn.addEventListener('click', function() {
        showRaw = false;
        filteredBtn.classList.add('active');
        rawBtn.classList.remove('active');
        renderDetailResults(resultsContainer, scan.filtered_results || []);
      });

      rawBtn.addEventListener('click', function() {
        showRaw = true;
        rawBtn.classList.add('active');
        filteredBtn.classList.remove('active');
        renderDetailResults(resultsContainer, scan.raw_results || []);
      });

      toggle.appendChild(filteredBtn);
      toggle.appendChild(rawBtn);
      app.appendChild(toggle);

      if (scan.status === 'report_ready') {
        const reportActions = document.createElement('div');
        reportActions.className = 'report-actions';

        const downloadLink = document.createElement('a');
        downloadLink.href = '/api/v1/scans/' + id + '/report';
        downloadLink.className = 'btn-download';
        downloadLink.textContent = 'Download Report (PDF)';
        downloadLink.download = '';
        reportActions.appendChild(downloadLink);

        const briefLink = document.createElement('a');
        briefLink.href = '/api/v1/scans/' + id + '/brief';
        briefLink.className = 'btn-json';
        briefLink.textContent = 'View Brief (JSON)';
        briefLink.target = '_blank';
        reportActions.appendChild(briefLink);

        app.appendChild(reportActions);
      }

      app.appendChild(resultsContainer);
      renderDetailResults(resultsContainer, scan.filtered_results || []);
    }

    function renderDetailResults(container, sources) {
      container.textContent = '';
      let total = 0;

      for (const source of sources) {
        if (source.error) {
          const err = document.createElement('div');
          err.className = 'error-source';
          err.textContent = source.source.toUpperCase() + ': ' + source.error;
          container.appendChild(err);
          continue;
        }

        for (const m of source.matches || []) {
          total++;
          const card = document.createElement('div');
          card.className = 'result-card';

          const tag = document.createElement('div');
          tag.className = 'source-tag';
          tag.textContent = source.source;
          card.appendChild(tag);

          const nameEl = document.createElement('div');
          nameEl.className = 'match-name';
          nameEl.textContent = m.name;
          const typeSpan = document.createElement('span');
          typeSpan.className = 'match-type';
          typeSpan.textContent = ' (' + m.type + ')';
          nameEl.appendChild(typeSpan);
          card.appendChild(nameEl);

          const summary = document.createElement('div');
          summary.className = 'match-summary';
          summary.textContent = m.summary;
          card.appendChild(summary);

          if (m.url) {
            const linkDiv = document.createElement('div');
            linkDiv.className = 'match-link';
            const link = document.createElement('a');
            link.href = m.url;
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = m.url;
            linkDiv.appendChild(link);
            card.appendChild(linkDiv);
          }

          container.appendChild(card);
        }
      }

      if (total === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-results';
        empty.textContent = 'No matches.';
        container.appendChild(empty);
      }
    }
  </script>
</body>
</html>
