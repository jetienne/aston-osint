<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aston OSINT</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">Aston OSINT</div>
    <div class="sidebar-section">
      <div class="sidebar-label">Intelligence</div>
      <a href="/" class="sidebar-link active">Scan</a>
      <a href="/sources.html" class="sidebar-link">Sources</a>
    </div>
  </aside>

  <main class="content">
    <div class="page-header">
      <h1>New Scan</h1>
    </div>

    <form id="scan-form">
      <div class="form-field">
        <label for="name">Full name (first + last) *</label>
        <input type="text" id="name" name="name" required placeholder="e.g. Viktor Vekselberg, Irina Dunaeva">
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="nationality">Country / nationality</label>
          <input type="text" id="nationality" name="nationality" placeholder="e.g. Russia, France">
        </div>
        <div class="form-field">
          <label for="birth_year">Birth year</label>
          <input type="number" id="birth_year" name="birth_year" placeholder="e.g. 1965" min="1900" max="2010">
        </div>
        <div class="form-field">
          <label for="company">Known company</label>
          <input type="text" id="company" name="company" placeholder="e.g. Renova Group">
        </div>
      </div>
      <button type="submit" id="submit-btn">Run scan</button>
    </form>

    <div id="status"></div>
    <div id="wizard"></div>
    <div id="results"></div>
  </main>

  <script>
    const form = document.getElementById('scan-form');
    const btn = document.getElementById('submit-btn');
    const statusEl = document.getElementById('status');
    const wizardEl = document.getElementById('wizard');
    const resultsEl = document.getElementById('results');

    let scanData = null;
    let scanId = null;
    let facets = [];
    let currentFacetIndex = 0;
    let selectedFilters = {};

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      if (!name) return;

      btn.disabled = true;
      btn.textContent = 'Scanning...';
      statusEl.textContent = 'Querying 5 sources in parallel...';
      wizardEl.style.display = 'none';
      resultsEl.style.display = 'none';

      try {
        const body = { name };
        const nationality = document.getElementById('nationality').value.trim();
        const birth_year = document.getElementById('birth_year').value.trim();
        const company = document.getElementById('company').value.trim();
        if (nationality) body.nationality = nationality;
        if (birth_year) body.birth_year = parseInt(birth_year);
        if (company) body.company = company;

        const resp = await fetch('/api/v1/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        scanData = await resp.json();
        scanId = scanData.scan_id;
        facets = (scanData.disambiguation && scanData.disambiguation.facets) || [];
        currentFacetIndex = 0;
        selectedFilters = {};

        statusEl.textContent = '';

        if (facets.length > 0) {
          showNextQuestion();
        } else {
          showResults(scanData);
        }
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run scan';
      }
    });

    function showNextQuestion() {
      if (currentFacetIndex >= facets.length) {
        wizardEl.style.display = 'none';
        refineAndShowResults();
        return;
      }

      const facet = facets[currentFacetIndex];
      wizardEl.style.display = 'block';
      wizardEl.textContent = '';

      const step = document.createElement('div');
      step.className = 'wizard-step';
      step.textContent = 'Step ' + (currentFacetIndex + 1) + ' of ' + facets.length;
      wizardEl.appendChild(step);

      const question = document.createElement('div');
      question.className = 'wizard-question';
      question.textContent = facet.label + '?';
      wizardEl.appendChild(question);

      const pills = document.createElement('div');
      pills.className = 'wizard-pills';

      const selected = new Set();

      for (const option of facet.options) {
        const pill = document.createElement('div');
        pill.className = 'pill';
        pill.textContent = option;
        pill.addEventListener('click', () => {
          if (selected.has(option)) {
            selected.delete(option);
            pill.classList.remove('selected');
          } else {
            selected.add(option);
            pill.classList.add('selected');
          }
        });
        pills.appendChild(pill);
      }
      wizardEl.appendChild(pills);

      const actions = document.createElement('div');
      actions.className = 'wizard-actions';

      const skipBtn = document.createElement('button');
      skipBtn.className = 'btn-secondary';
      skipBtn.textContent = 'Skip';
      skipBtn.addEventListener('click', () => {
        currentFacetIndex++;
        showNextQuestion();
      });
      actions.appendChild(skipBtn);

      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary';
      nextBtn.textContent = currentFacetIndex === facets.length - 1 ? 'Show results' : 'Next';
      nextBtn.addEventListener('click', () => {
        if (selected.size > 0) {
          selectedFilters[facet.field] = Array.from(selected);
        }
        currentFacetIndex++;
        showNextQuestion();
      });
      actions.appendChild(nextBtn);

      wizardEl.appendChild(actions);
    }

    async function refineAndShowResults() {
      const hasFilters = Object.keys(selectedFilters).length > 0;

      if (hasFilters && scanId) {
        statusEl.textContent = 'Filtering results...';
        try {
          const resp = await fetch('/api/v1/scan/' + scanId + '/refine', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filters: selectedFilters, dismissed: [] }),
          });
          scanData = await resp.json();
        } catch (err) {
          statusEl.textContent = 'Error refining: ' + err.message;
          return;
        }
      }

      statusEl.textContent = '';
      showResults(scanData);
    }

    function showResults(data) {
      resultsEl.textContent = '';
      resultsEl.style.display = 'block';

      let totalMatches = 0;

      for (const source of data.sources) {
        if (source.error) {
          const errDiv = document.createElement('div');
          errDiv.className = 'error-source';
          errDiv.textContent = source.source.toUpperCase() + ': ' + source.error;
          resultsEl.appendChild(errDiv);
          continue;
        }

        for (const m of source.matches) {
          totalMatches++;
          const card = document.createElement('div');
          card.className = 'result-card';

          const tag = document.createElement('div');
          tag.className = 'source-tag';
          tag.textContent = source.source;
          card.appendChild(tag);

          const nameEl = document.createElement('div');
          nameEl.className = 'match-name';
          const typeSpan = document.createElement('span');
          typeSpan.className = 'match-type';
          typeSpan.textContent = ' (' + m.type + ')';
          nameEl.textContent = m.name;
          nameEl.appendChild(typeSpan);
          card.appendChild(nameEl);

          const summary = document.createElement('div');
          summary.className = 'match-summary';
          summary.textContent = m.summary;
          card.appendChild(summary);

          if (m.url) {
            const linkDiv = document.createElement('div');
            linkDiv.className = 'match-link';
            const link = document.createElement('a');
            link.href = m.url;
            link.target = '_blank';
            link.rel = 'noopener';
            link.textContent = m.url;
            linkDiv.appendChild(link);
            card.appendChild(linkDiv);
          }

          resultsEl.appendChild(card);
        }
      }

      if (totalMatches === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-results';
        empty.textContent = 'No matches found across any source.';
        resultsEl.appendChild(empty);
      }

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = 'Sources: ' + data.sources_hit.join(', ');
      if (data.sources_failed && data.sources_failed.length) {
        meta.textContent += ' | Failed: ' + data.sources_failed.join(', ');
      }
      if (data.duration_ms) {
        meta.textContent += ' | ' + data.duration_ms + 'ms';
      }
      resultsEl.appendChild(meta);
    }
  </script>
</body>
</html>
